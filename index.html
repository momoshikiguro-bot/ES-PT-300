const TOTAL_DAYS = 300;
const DAY_NAMES = ["Senin","Selasa","Rabu","Kamis","Jumat","Sabtu","Minggu"];

function getPhase(month) { return PHASES.find(p => p.months.includes(month)) || PHASES[0]; }
function getPhaseId(month) { return getPhase(month).id; }
function getDayTasks(month, dow) { return DAY_TASKS[getPhaseId(month)]?.[dow] || []; }
function getDayOfWeek(d) { return (d - 1) % 7; }
function getMonth(d) { return Math.min(10, Math.ceil(d / 30)); }
function loadLS(key, fb) { try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fb; } catch { return fb; } }
function saveLS(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

function ConfirmModal({ message, onConfirm, onCancel, color }) {
  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:"20px" }}>
      <div style={{ background:"#1a1a1a",border:`1px solid ${color}44`,borderRadius:"16px",padding:"28px",maxWidth:"300px",width:"100%",textAlign:"center" }}>
        <div style={{ fontSize:"32px",marginBottom:"12px" }}>⚠️</div>
        <p style={{ color:"#ddd",fontSize:"15px",lineHeight:1.6,marginBottom:"24px" }}>{message}</p>
        <div style={{ display:"flex",gap:"10px" }}>
          <button onClick={onCancel} style={{ flex:1,padding:"12px",borderRadius:"8px",border:"1px solid #333",background:"transparent",color:"#999",fontFamily:"inherit",fontSize:"14px" }}>Batal</button>
          <button onClick={onConfirm} style={{ flex:1,padding:"12px",borderRadius:"8px",border:"none",background:color,color:"#fff",fontFamily:"inherit",fontSize:"14px",fontWeight:"600" }}>Reset</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [currentDay, setCurrentDay] = React.useState(() => loadLS("est-day", 1));
  const [completed, setCompleted] = React.useState(() => loadLS("est-completed", {}));
  const [view, setView] = React.useState("day");
  const [showReset, setShowReset] = React.useState(false);
  const [justCompleted, setJustCompleted] = React.useState(false);

  function persist(comp, day) { saveLS("est-completed", comp); saveLS("est-day", day); }

  function toggleTask(day, idx) {
    const key = `${day}-${idx}`;
    const next = { ...completed, [key]: !completed[key] };
    if (!next[key]) delete next[key];
    setCompleted(next);
    persist(next, currentDay);
    const tasks = getDayTasks(getMonth(day), getDayOfWeek(day));
    if (tasks.every((_, i) => next[`${day}-${i}`])) setJustCompleted(true);
  }

  function goToDay(d) {
    const c = Math.max(1, Math.min(TOTAL_DAYS, d));
    setCurrentDay(c); persist(completed, c); setJustCompleted(false);
  }

  function doReset() {
    setCompleted({}); setCurrentDay(1); setJustCompleted(false); setShowReset(false);
    saveLS("est-completed", {}); saveLS("est-day", 1);
  }

  function dayCompleted(day) {
    const tasks = getDayTasks(getMonth(day), getDayOfWeek(day));
    return tasks.length > 0 && tasks.every((_, i) => completed[`${day}-${i}`]);
  }
  function dayProgress(day) {
    const tasks = getDayTasks(getMonth(day), getDayOfWeek(day));
    if (!tasks.length) return 0;
    return tasks.filter((_, i) => completed[`${day}-${i}`]).length / tasks.length;
  }

  const daysCompleted = Array.from({length:TOTAL_DAYS},(_,i)=>i+1).filter(dayCompleted).length;
  const streak = (() => { let s=0; for(let d=currentDay;d>=1;d--){if(dayCompleted(d))s++;else break;} return s; })();
  const month = getMonth(currentDay);
  const phase = getPhase(month);
  const dow = getDayOfWeek(currentDay);
  const tasks = getDayTasks(month, dow);
  const todayDone = tasks.filter((_,i) => completed[`${currentDay}-${i}`]).length;
  const totalMin = tasks.reduce((s,t)=>s+t.duration,0);
  const doneMin = tasks.filter((_,i)=>completed[`${currentDay}-${i}`]).reduce((s,t)=>s+t.duration,0);
  const pc = phase.color;

  return (
    <div style={{ fontFamily:"Georgia,serif",background:"#0d0d0d",minHeight:"100vh",color:"#f0ece4" }}>
      {showReset && <ConfirmModal message="Hapus semua progress dan mulai dari Hari 1 lagi?" onConfirm={doReset} onCancel={()=>setShowReset(false)} color={pc} />}

              <div style={{ fontSize:"18px",letterSpacing:"-0.5px" }}>
                <span style={{ color:"#E8643A" }}>ES</span> × <span style={{ color:"#2E86AB" }}>PT</span>
                <span style={{ color:"#555",fontSize:"13px",marginLeft:"8px" }}>10 Bulan</span>
              </div>
            </div>
            <div style={{ display:"flex",gap:"6px",alignItems:"center" }}>
              {["day","overview"].map(v=>(
                <button key={v} onClick={()=>setView(v)} style={{ padding:"6px 12px",borderRadius:"100px",border:view===v?`1px solid ${pc}`:"1px solid #333",background:view===v?pc:"transparent",color:view===v?"#fff":"#777",fontSize:"11px",fontFamily:"inherit",letterSpacing:"1px" }}>
                  {v==="day"?"Hari Ini":"Overview"}
                </button>
              ))}
              <button onClick={()=>setShowReset(true)} title="Reset" style={{ width:"32px",height:"32px",borderRadius:"50%",border:"1px solid #2a2a2a",background:"transparent",color:"#555",fontSize:"15px",fontFamily:"inherit" }}>↺</button>
            </div>
          </div>
          <div style={{ display:"flex",gap:"10px",marginTop:"14px" }}>
            {[{label:"Hari",value:`${currentDay}/${TOTAL_DAYS}`},{label:"Selesai",value:`${daysCompleted} hr`},{label:"Streak",value:`🔥 ${streak}`},{label:"Progress",value:`${Math.round((currentDay/TOTAL_DAYS)*100)}%`}].map(s=>(

                <div style={{ fontSize:"12px",color:"#666" }}>{DAY_NAMES[dow]} · Bulan {month} · {phase.label}</div>
              </div>
              <button onClick={()=>goToDay(currentDay+1)} style={{ width:"36px",height:"36px",borderRadius:"50%",border:`1px solid ${pc}44`,background:"transparent",color:"#aaa",fontSize:"16px",fontFamily:"inherit" }}>→</button>
            </div>

            <div style={{ background:`${pc}15`,border:`1px solid ${pc}33`,borderRadius:"10px",padding:"10px 14px",marginBottom:"16px",display:"flex",justifyContent:"space-between" }}>
              <span style={{ fontSize:"12px",color:pc }}>Fase {phase.id}: {phase.label}</span>
              <span style={{ fontSize:"12px",color:"#777" }}>⏱ {totalMin} mnt</span>
            </div>

            <div style={{ marginBottom:"16px" }}>
              <div style={{ display:"flex",justifyContent:"space-between",marginBottom:"6px" }}>
                <span style={{ fontSize:"12px",color:"#666" }}>Progress hari ini</span>
                <span style={{ fontSize:"12px",color:"#aaa" }}>{todayDone}/{tasks.length} · {doneMin}/{totalMin} mnt</span>
              </div>
              <div style={{ background:"#1a1a1a",borderRadius:"100px",height:"8px" }}>
                <div style={{ height:"100%",width:`${tasks.length?(todayDone/tasks.length)*100:0}%`,background:pc,borderRadius:"100px",transition:"width 0.3s" }} />
              </div>
            </div>

            <div style={{ display:"flex",flexDirection:"column",gap:"10px" }}>
              {tasks.map((t,i) => {
                const done = !!completed[`${currentDay}-${i}`];
                return (
                  <div key={i} onClick={()=>toggleTask(currentDay,i)} style={{ background:done?`${pc}18`:"#1a1a1a",border:`1px solid ${done?pc+"44":"#2a2a2a"}`,borderRadius:"12px",padding:"14px 16px",cursor:"pointer",transition:"all 0.15s",display:"flex",gap:"12px",alignItems:"flex-start" }}>
                    <div style={{ width:"22px",height:"22px",borderRadius:"50%",flexShrink:0,border:`2px solid ${done?pc:"#444"}`,background:done?pc:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",color:"#fff",marginTop:"1px" }}>{done?"✓":""}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex",gap:"6px",marginBottom:"4px",alignItems:"center" }}>
                        <span style={{ fontSize:"13px" }}>{t.lang}</span>
                        <span style={{ fontSize:"10px",letterSpacing:"1px",color:done?pc:"#666",textTransform:"uppercase" }}>{t.tag}</span>
                        <span style={{ marginLeft:"auto",fontSize:"11px",color:"#555" }}>⏱{t.duration}m</span>
                      </div>
                      <div style={{ fontSize:"14px",color:done?"#777":"#ddd",textDecoration:done?"line-through":"none",lineHeight:1.5 }}>{t.task}</div>
                    </div>
                  </div>
                );
              })}
            </div>

            {justCompleted && todayDone===tasks.length && tasks.length>0 && (
              <div style={{ marginTop:"20px",background:`${pc}20`,border:`1px solid ${pc}44`,borderRadius:"12px",padding:"20px",textAlign:"center" }}>
                <div style={{ fontSize:"28px",marginBottom:"6px" }}>🎉</div>
                <div style={{ color:pc,fontWeight:"600",marginBottom:"6px" }}>Hari {currentDay} Selesai!</div>
                <div style={{ color:"#888",fontSize:"13px",marginBottom:"16px" }}>Istirahat dulu, lanjut besok 💪</div>
                <button onClick={()=>{goToDay(currentDay+1);setJustCompleted(false);}} style={{ padding:"10px 24px",borderRadius:"100px",border:"none",background:pc,color:"#fff",fontFamily:"inherit",fontSize:"13px",letterSpacing:"1px" }}>
                  Hari {currentDay+1} →
                </button>
              </div>
            )}
          </div>
        )}

        {/* OVERVIEW */}
        {view==="overview" && (
          <div style={{ padding:"20px" }}>
            <div style={{ fontSize:"11px",letterSpacing:"3px",color:"#555",textTransform:"uppercase",marginBottom:"16px" }}>Semua 300 Hari — klik kotak untuk pindah</div>
            {Array.from({length:10},(_,mi)=>mi+1).map(m=>{
              const ph=getPhase(m);
              const days=Array.from({length:30},(_,di)=>(m-1)*30+di+1);
              const doneDays=days.filter(dayCompleted).length;
              return (
                <div key={m} style={{ marginBottom:"20px" }}>
                  <div style={{ display:"flex",justifyContent:"space-between",marginBottom:"8px" }}>
                    <div style={{ display:"flex",gap:"8px",alignItems:"center" }}>
                      <div style={{ width:"8px",height:"8px",borderRadius:"50%",background:ph.color }} />
                      <span style={{ fontSize:"13px",color:"#ccc" }}>Bulan {m}</span>
                      <span style={{ fontSize:"11px",color:"#555" }}>— {ph.label}</span>
                    </div>
                    <span style={{ fontSize:"11px",color:"#666" }}>{doneDays}/30</span>
                  </div>
                  <div style={{ display:"grid",gridTemplateColumns:"repeat(10,1fr)",gap:"3px" }}>
                    {days.map(d=>{
                      const prog=dayProgress(d);
                      const isCur=d===currentDay;
                      return (
                        <div key={d} onClick={()=>{goToDay(d);setView("day");}} title={`Hari ${d}`}
                          style={{ height:"22px",borderRadius:"4px",cursor:"pointer",background:prog===1?ph.color:prog>0?`${ph.color}55`:"#1a1a1a",border:isCur?"2px solid #fff":`1px solid ${prog>0?ph.color+"44":"#252525"}`,transform:isCur?"scale(1.15)":"scale(1)",transition:"transform 0.1s" }}
                        />
                      );
                    })}
                  </div>
                </div>
              );
            })}

            <div style={{ display:"flex",gap:"16px",fontSize:"11px",color:"#555",marginTop:"4px",flexWrap:"wrap" }}>
              {[{bg:"#1a1a1a",border:"#333",label:"Belum"},{bg:"#E8643A55",border:"#E8643A44",label:"Sebagian"},{bg:"#E8643A",border:"none",label:"Selesai"},{bg:"transparent",border:"#fff",label:"Hari ini"}].map(l=>(
                <div key={l.label} style={{ display:"flex",gap:"6px",alignItems:"center" }}>
                  <div style={{ width:"12px",height:"12px",background:l.bg,border:`1px solid ${l.border}`,borderRadius:"2px" }} />
                  <span>{l.label}</span>
                </div>
              ))}
            </div>

            <button onClick={()=>setShowReset(true)} style={{ marginTop:"28px",width:"100%",padding:"12px",borderRadius:"10px",border:"1px solid #2a2a2a",background:"transparent",color:"#555",fontFamily:"inherit",fontSize:"13px",letterSpacing:"1px" }}>
              ↺ Reset Semua Progress
            </button>
          </div>
        )}

        <div style={{ borderTop:"1px solid #1a1a1a",padding:"14px 20px",textAlign:"center" }}>
          <div style={{ fontSize:"11px",color:"#3a3a3a",fontStyle:"italic" }}>
            Progress tersimpan di browser ini · {daysCompleted} hari selesai dari {TOTAL_DAYS}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
